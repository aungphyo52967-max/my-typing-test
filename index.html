<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Typing Pro with Keyboard</title>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --text: #212529; --primary: #007bff; --key-bg: #e9ecef; }
        [data-theme='dark'] { --bg: #1a1a1a; --card: #2d2d2d; --text: #f8f9fa; --primary: #375a7f; --key-bg: #444; }

        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: 0.3s; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 95%; max-width: 800px; text-align: center; }
        
        #word-display { font-size: 24px; margin: 15px 0; padding: 15px; background: rgba(0,0,0,0.03); border-radius: 10px; line-height: 1.6; text-align: left; }
        .correct { color: #28a745; }
        .incorrect { color: #dc3545; text-decoration: underline; }
        
        input { width: 100%; padding: 12px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 20px; background: var(--card); color: var(--text); }

        /* Keyboard Styles */
        .keyboard { display: grid; grid-template-columns: repeat(30, 1fr); gap: 5px; margin-top: 20px; background: #333; padding: 15px; border-radius: 10px; }
        .key { grid-column: span 2; background: var(--key-bg); border-radius: 5px; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; transition: 0.1s; border-bottom: 3px solid #bbb; }
        .key.active { background: var(--primary); color: white; transform: translateY(2px); border-bottom: none; }
        .key.space { grid-column: span 10; }
        
        .stats { display: flex; justify-content: space-around; margin-bottom: 10px; font-weight: bold; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="card">
    <div class="stats">
        <div>WPM: <span id="wpm">0</span></div>
        <div>အချိန်: <span id="time">60</span>s</div>
        <button class="btn" onclick="toggleTheme()">Theme</button>
    </div>

    <div id="word-display"></div>
    <input type="text" id="word-input" placeholder="ဒီမှာ စတင်ရိုက်ပါ..." autofocus>

    <div class="keyboard" id="keyboard">
        <div class="key" data-key="q">ဆ</div><div class="key" data-key="w">တ</div><div class="key" data-key="e">န</div><div class="key" data-key="r">မ</div><div class="key" data-key="t">အ</div>
        <div class="key" data-key="y">ပ</div><div class="key" data-key="u">က</div><div class="key" data-key="i">င</div><div class="key" data-key="o">သ</div><div class="key" data-key="p">စ</div>
        <div class="key" data-key="a">ေ</div><div class="key" data-key="s">ှ</div><div class="key" data-key="d">ိ</div><div class="key" data-key="f">်</div><div class="key" data-key="g">ါ</div>
        <div class="key" data-key="h">့</div><div class="key" data-key="j">ြ</div><div class="key" data-key="k">ု</div><div class="key" data-key="l">ူ</div><div class="key" data-key=";">း</div>
        <div class="key" data-key="z">ဖ</div><div class="key" data-key="x">ထ</div><div class="key" data-key="c">ခ</div><div class="key" data-key="v">လ</div><div class="key" data-key="b">ဘ</div>
        <div class="key" data-key="n">ည</div><div class="key" data-key="m">ာ</div><div class="key" data-key=",">ယ</div><div class="key" data-key=".">ဝ</div><div class="key" data-key="/">၏</div>
        <div style="grid-column: span 10"></div>
        <div class="key space" data-key=" ">Space</div>
    </div>

        wordDisplay.innerHTML = '';

            const span = document.createElement('span');
            span.innerText = char;
            wordDisplay.appendChild(span);
        });
    }

    });
