<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Typing Master - All-in-One</title>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --text: #2d3436; --primary: #0984e3; --accent: #fdcb6e; }
        [data-theme='dark'] { --bg: #2d3436; --card: #636e72; --text: #dfe6e9; --primary: #74b9ff; }

        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; transition: 0.3s; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 850px; text-align: center; }
        
        .mode-selector { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; }
        .mode-btn { padding: 8px 15px; border: 2px solid var(--primary); background: transparent; color: var(--primary); border-radius: 20px; cursor: pointer; font-weight: bold; }
        .mode-btn.active { background: var(--primary); color: white; }

        #word-display { font-size: 26px; margin: 20px 0; padding: 25px; background: rgba(0,0,0,0.03); border-radius: 12px; line-height: 2; text-align: left; min-height: 80px; letter-spacing: 2px; }
        .correct { color: #00b894; }
        .incorrect { color: #d63031; background: #ff767544; border-radius: 4px; }
        
        input { width: 100%; padding: 18px; font-size: 20px; border: 2px solid #dfe6e9; border-radius: 12px; outline: none; background: var(--card); color: var(--text); margin-bottom: 20px; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(9, 132, 227, 0.2); }

        /* Hand Animation */
        .hands-area { display: flex; justify-content: space-around; width: 100%; max-width: 600px; margin: 20px auto; }
        .hand-svg { width: 220px; height: auto; }
        .finger { transition: fill 0.1s, transform 0.1s; fill: #ffe0b2; stroke: #ccae85; stroke-width: 1; }
        .active-finger { fill: var(--accent) !important; transform: translateY(-5px); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-item { background: var(--bg); padding: 10px; border-radius: 10px; font-weight: bold; }
        .btn-main { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">🇲🇲 Myanmar Typing Master</h2>
    
    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('consonants', this)">က မှ အ (ဗျည်းများ)</button>
        <button class="mode-btn" onclick="setMode('geography', this)">နိုင်ငံအကြောင်း</button>
    </div>

    <div class="stats-grid">
        <div class="stat-item">အချိန်: <span id="time">60</span>s</div>
        <div class="stat-item">WPM: <span id="wpm">0</span></div>
        <div class="stat-item">မှန်ကန်မှု: <span id="accuracy">0</span>%</div>
    </div>

    <div id="word-display"></div>
    <input type="text" id="word-input" placeholder="စာသားများကို ဤနေရာတွင် ရိုက်ပါ..." autocomplete="off" autofocus>

    <div class="hands-area">
        <svg class="hand-svg" viewBox="0 0 200 200">
            <path id="left-pinky" class="finger" d="M30,100 Q30,40 50,40 L60,40 Q80,40 80,100 Z" />
            <path id="left-ring" class="finger" d="M60,90 Q60,20 80,20 L90,20 Q110,20 110,90 Z" />
            <path id="left-middle" class="finger" d="M95,80 Q95,10 115,10 L125,10 Q145,10 145,80 Z" />
            <path id="left-index" class="finger" d="M130,90 Q130,30 150,30 L160,30 Q180,30 180,90 Z" />
            <path id="left-thumb" class="finger" d="M160,140 Q190,140 190,170 L170,190 Q140,190 140,160 Z" />
        </svg>
        <svg class="hand-svg" viewBox="0 0 200 200">
            <path id="right-thumb" class="finger" d="M40,140 Q10,140 10,170 L30,190 Q60,190 60,160 Z" />
            <path id="right-index" class="finger" d="M20,90 Q20,30 40,30 L50,30 Q70,30 70,90 Z" />
            <path id="right-middle" class="finger" d="M55,80 Q55,10 75,10 L85,10 Q105,10 105,80 Z" />
            <path id="right-ring" class="finger" d="M90,90 Q90,20 110,20 L120,20 Q140,20 140,90 Z" />
            <path id="right-pinky" class="finger" d="M120,100 Q120,40 140,40 L150,40 Q170,40 170,100 Z" />
        </svg>
    </div>

    <button class="btn-main" onclick="location.reload()">ပြန်စမည်</button>
</div>

<script>
    const data = {
        consonants: ["က ခ ဂ ဃ င စ ဆ ဇ ဈ ည ဋ ဌ ဍ ဎ ဏ တ ထ ဒ ဓ န ပ ဖ ဗ ဘ မ ယ ရ လ ဝ သ ဟ ဠ အ"],
        geography: [
            "မြန်မာနိုင်ငံသည် အရှေ့တောင်အာရှတွင် တည်ရှိသည်။",
            "ဧရာဝတီမြစ်သည် မြန်မာနိုင်ငံ၏ အရှည်ဆုံးမြစ်ဖြစ်သည်။",
            "ရန်ကုန်မြို့တွင် ရွှေတိဂုံစေတီတော်မြတ်ကြီး တည်ရှိသည်။",
            "မြန်မာနိုင်ငံတွင် တိုင်းရင်းသားလူမျိုးပေါင်း ၁၃၅ မျိုး နေထိုင်ကြသည်။"
        ]
    };

    const fingerMap = {
        'က':'right-index', 'ခ':'left-middle', 'ဂ':'right-ring', 'င':'right-middle',
        'စ':'right-pinky', 'ဆ':'left-pinky', 'ဇ':'right-pinky', 'ည':'right-index',
        'တ':'left-ring', 'ထ':'left-ring', 'ဒ':'right-middle', 'ဓ':'right-ring',
        'န':'left-middle', 'ပ':'right-index', 'ဖ':'left-pinky', 'ဗ':'left-index',
        'ဘ':'left-index', 'မ':'left-index', 'ယ':'right-middle', 'ရ':'left-index',
        'လ':'left-index', 'ဝ':'right-ring', 'သ':'right-ring', 'ဟ':'right-ring',
        'အ':'left-index', 'ဃ':'right-pinky', 'ဈ':'right-pinky', 'ဋ':'right-pinky',
        'ဌ':'right-pinky', 'ဍ':'right-pinky', 'ဎ':'right-pinky', 'ဏ':'right-ring',
        ' ' : 'right-thumb'
    };

    let currentMode = 'consonants';
    let currentText = data[currentMode][0];
    let timeLeft = 60;
    let timerStarted = false;
    let timer;

    const wordDisplay = document.getElementById('word-display');
    const wordInput = document.getElementById('word-input');

    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentText = data[mode][Math.floor(Math.random() * data[mode].length)];
        resetGame();
    }

    function init() {
        wordDisplay.innerHTML = '';
        currentText.split('').forEach(char => {
            const span = document.createElement('span');
            span.innerText = char;
            wordDisplay.appendChild(span);
        });
    }

    wordInput.addEventListener('input', () => {
        if(!timerStarted) { startTimer(); timerStarted = true; }
        
        const spans = wordDisplay.querySelectorAll('span');
        const inputVal = wordInput.value.split('');
        let correctCount = 0;

        spans.forEach((span, i) => {
            if (inputVal[i] == null) {
                span.classList.remove('correct', 'incorrect');
            } else if (inputVal[i] === span.innerText) {
                span.classList.add('correct');
                span.classList.remove('incorrect');
                correctCount++;
            } else {
                span.classList.add('incorrect');
                span.classList.remove('correct');
            }
        });

        // Animation for next character
        const nextChar = currentText[wordInput.value.length];
        highlightFinger(nextChar);

        // Accuracy
        document.getElementById('accuracy').innerText = Math.round((correctCount / (wordInput.value.length || 1)) * 100);

        if (wordInput.value === currentText) {
            if(currentMode === 'geography') {
                wordInput.value = '';
                currentText = data.geography[Math.floor(Math.random() * data.geography.length)];
                init();
            } else {
                clearInterval(timer);
                alert("ဗျည်းများအားလုံး ရိုက်နှိပ်ပြီးပါပြီ!");
            }
        }
    });

    function highlightFinger(char) {
        document.querySelectorAll('.finger').forEach(f => f.classList.remove('active-finger'));
        const fingerId = fingerMap[char];
        if(fingerId) document.getElementById(fingerId).classList.add('active-finger');
    }

    function startTimer() {
        timer = setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--;
                document.getElementById('time').innerText = timeLeft;
                let wpm = Math.round((wordInput.value.length / 5) / ((60 - timeLeft) / 60));
                document.getElementById('wpm').innerText = wpm || 0;
            } else {
                clearInterval(timer);
                wordInput.disabled = true;
                alert("အချိန်ကုန်သွားပါပြီ!");
            }
        }, 1000);
    }

    function resetGame() {
        clearInterval(timer);
        timeLeft = 60;
        timerStarted = false;
        wordInput.value = '';
        wordInput.disabled = false;
        document.getElementById('time').innerText = '60';
        document.getElementById('wpm').innerText = '0';
        document.getElementById('accuracy').innerText = '0';
        init();
    }

    init();
</script>
</body>
</html>
