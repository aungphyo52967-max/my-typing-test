<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Typing Trainer</title>
    <style>
        body { font-family: 'Pyidaungsu', 'Unicode', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); width: 90%; max-width: 500px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        #word-display { font-size: 22px; margin: 20px 0; padding: 15px; background: #f9f9f9; border-radius: 10px; line-height: 1.8; text-align: left; border: 1px solid #ddd; min-height: 60px; }
        .correct { color: #28a745; }
        .incorrect { color: #dc3545; background: #ffdada; border-radius: 3px; }
        input { width: 100%; padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; outline: none; box-sizing: border-box; }
        input:focus { border-color: #1a73e8; }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; font-weight: bold; font-size: 16px; }
        .timer { font-size: 18px; color: #e67e22; margin-bottom: 10px; }
        button { margin-top: 20px; padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>Typing Test (မြန်မာ)</h2>
    <div class="timer">အချိန်လက်ကျန်: <span id="time">60</span>s</div>
    
    <div id="word-display"></div>
    
    <input type="text" id="word-input" placeholder="ဒီမှာ စတင်ရိုက်နှိပ်ပါ..." autocomplete="off">

    <div class="stats">
        <div>မှန်ကန်မှု: <span id="accuracy">0</span>%</div>
    </div>
    <button onclick="location.reload()">ပြန်စမည်</button>
</div>

    const wordDisplay = document.getElementById('word-display');
    const wordInput = document.getElementById('word-input');
    const timeDisplay = document.getElementById('time');
    const accuracyDisplay = document.getElementById('accuracy');

    let timerStarted = false;
