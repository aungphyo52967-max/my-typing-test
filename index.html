<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Typing Master - Final</title>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --text: #2d3436; --primary: #0984e3; --accent: #fdcb6e; }
        [data-theme='dark'] { --bg: #2d3436; --card: #636e72; --text: #dfe6e9; --primary: #74b9ff; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; transition: 0.3s; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 95%; max-width: 800px; text-align: center; }
        .mode-selector { margin-bottom: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .mode-btn { padding: 8px 12px; border: 2px solid var(--primary); background: transparent; color: var(--primary); border-radius: 20px; cursor: pointer; font-size: 14px; }
        .mode-btn.active { background: var(--primary); color: white; }
        #word-display { font-size: 24px; margin: 15px 0; padding: 20px; background: rgba(0,0,0,0.03); border-radius: 12px; line-height: 1.8; text-align: left; min-height: 60px; word-break: break-word; }
        .correct { color: #00b894; }
        .incorrect { color: #d63031; background: #ff767544; border-radius: 4px; }
        input { width: 100%; padding: 15px; font-size: 18px; border: 2px solid #dfe6e9; border-radius: 10px; outline: none; background: var(--card); color: var(--text); }
        .hands-area { display: flex; justify-content: space-around; width: 100%; max-width: 500px; margin: 15px auto; }
        .hand-svg { width: 45%; height: auto; }
        .finger { transition: fill 0.1s, transform 0.1s; fill: #ffe0b2; stroke: #ccae85; stroke-width: 1; }
        .active-finger { fill: var(--accent) !important; transform: translateY(-5px); }
        .stats { display: flex; justify-content: space-around; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('consonants', this)">က မှ အ</button>
        <button class="mode-btn" onclick="setMode('geography', this)">မြန်မာနိုင်ငံအကြောင်း</button>
    </div>
    <div class="stats">
        <div>WPM: <span id="wpm">0</span></div>
        <div>အချိန်: <span id="time">60</span>s</div>
        <div>မှန်: <span id="accuracy">0</span>%</div>
    </div>
    <div id="word-display"></div>
    <input type="text" id="word-input" placeholder="ဒီမှာ ရိုက်ပါ..." autocomplete="off" autofocus>
    <div class="hands-area">
        <svg class="hand-svg" viewBox="0 0 200 200">
            <path id="left-pinky" class="finger" d="M30,100 Q30,40 50,40 L60,40 Q80,40 80,100 Z" />
            <path id="left-ring" class="finger" d="M60,90 Q60,20 80,20 L90,20 Q110,20 110,90 Z" />
            <path id="left-middle" class="finger" d="M95,80 Q95,10 115,10 L125,10 Q145,10 145,80 Z" />
            <path id="left-index" class="finger" d="M130,90 Q130,30 150,30 L160,30 Q180,30 180,90 Z" />
            <path id="left-thumb" class="finger" d="M160,140 Q190,140 190,170 L170,190 Q140,190 140,160 Z" />
        </svg>
        <svg class="hand-svg" viewBox="0 0 200 200">
            <path id="right-thumb" class="finger" d="M40,140 Q10,140 10,170 L30,190 Q60,190 60,160 Z" />
            <path id="right-index" class="finger" d="M20,90 Q20,30 40,30 L50,30 Q70,30 70,90 Z" />
            <path id="right-middle" class="finger" d="M55,80 Q55,10 75,10 L85,10 Q105,10 105,80 Z" />
            <path id="right-ring" class="finger" d="M90,90 Q90,20 110,20 L120,20 Q140,20 140,90 Z" />
            <path id="right-pinky" class="finger" d="M120,100 Q120,40 140,40 L150,40 Q170,40 170,100 Z" />
        </svg>
    </div>
    <button class="mode-btn" style="border-color:#ccc; color:#666;" onclick="location.reload()">Restart</button>
</div>
<script>
    const data = {
        consonants: ["က ခ ဂ ဃ င စ ဆ ဇ ဈ ည ဋ ဌ ဍ ဎ ဏ တ ထ ဒ ဓ န ပ ဖ ဗ ဘ မ ယ ရ လ ဝ သ ဟ ဠ အ"],
        geography: ["ရန်ကုန်မြို့သည် မြန်မာနိုင်ငံ၏ စီးပွားရေးမြို့တော်ဖြစ်သည်။", "ဧရာဝတီမြစ်သည် မြန်မာနိုင်ငံ၏ အသက်သွေးကြောဖြစ်သည်။", "ပုဂံသည် မြန်မာ့ယဉ်ကျေးမှု အမွေအနှစ်များ တည်ရှိရာနေရာဖြစ်သည်။"]
    };
    const fingerMap = { 'က':'right-index','ခ':'left-middle','ဂ':'right-ring','င':'right-middle','စ':'right-pinky','ဆ':'left-pinky','တ':'left-ring','န':'left-middle','ပ':'right-index','မ':'left-index',' ' : 'right-thumb'};
    let currentMode = 'consonants', currentText = data[currentMode][0], timeLeft = 60, timerStarted = false, timer;
    const wordDisplay = document.getElementById('word-display'), wordInput = document.getElementById('word-input');
    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentText = data[mode][Math.floor(Math.random() * data[mode].length)];
        resetGame();
    }
    function init() {
        wordDisplay.innerHTML = '';
        currentText.split('').forEach(char => {
            const span = document.createElement('span');
            span.innerText = char;
            wordDisplay.appendChild(span);
        });
        highlightFinger(currentText[0]);
    }
    wordInput.addEventListener('input', () => {
        if(!timerStarted) { startTimer(); timerStarted = true; }
        const spans = wordDisplay.querySelectorAll('span'), inputVal = wordInput.value.split('');
        let correctCount = 0;
        spans.forEach((span, i) => {
            if (inputVal[i] == null) span.classList.remove('correct', 'incorrect');
            else if (inputVal[i] === span.innerText) { span.classList.add('correct'); correctCount++; }
            else span.classList.add('incorrect');
        });
        highlightFinger(currentText[wordInput.value.length]);
        document.getElementById('accuracy').innerText = Math.round((correctCount / (wordInput.value.length || 1)) * 100);
        if (wordInput.value === currentText) {
            if(currentMode === 'geography') {
                wordInput.value = ''; currentText = data.geography[Math.floor(Math.random() * data.geography.length)]; init();
            } else alert("အောင်မြင်ပါတယ်!");
        }
    });
    function highlightFinger(char) {
        document.querySelectorAll('.finger').forEach(f => f.classList.remove('active-finger'));
        const fingerId = fingerMap[char];
        if(fingerId) document.getElementById(fingerId).classList.add('active-finger');
    }
    function startTimer() {
        timer = setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--; document.getElementById('time').innerText = timeLeft;
                let wpm = Math.round((wordInput.value.length / 5) / ((60 - timeLeft) / 60));
                document.getElementById('wpm').innerText = wpm || 0;
            } else { clearInterval(timer); wordInput.disabled = true; }
        }, 1000);
    }
    function resetGame() { clearInterval(timer); timeLeft = 60; timerStarted = false; wordInput.value = ''; init(); }
    init();
</script>
</body>
</html>
