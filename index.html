<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Typing Pro with Visual Guide</title>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --text: #212529; --primary: #007bff; --key-bg: #e9ecef; --finger-correct: #28a745; --finger-incorrect: #dc3545; }
        [data-theme='dark'] { --bg: #1a1a1a; --card: #2d2d2d; --text: #f8f9fa; --primary: #375a7f; --key-bg: #444; }

        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: 0.3s; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 95%; max-width: 800px; text-align: center; }
        
        #word-display { font-size: 24px; margin: 15px 0; padding: 15px; background: rgba(0,0,0,0.03); border-radius: 10px; line-height: 1.6; text-align: left; }
        .correct { color: #28a745; }
        .incorrect { color: #dc3545; text-decoration: underline; }
        
        input { width: 100%; padding: 12px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 20px; background: var(--card); color: var(--text); }

        /* Keyboard Styles */
        .keyboard { display: grid; grid-template-columns: repeat(30, 1fr); gap: 5px; margin-top: 20px; background: #333; padding: 15px; border-radius: 10px; }
        .key { grid-column: span 2; background: var(--key-bg); border-radius: 5px; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; transition: 0.1s; border-bottom: 3px solid #bbb; }
        .key.active { background: var(--primary); color: white; transform: translateY(2px); border-bottom: none; }
        .key.space { grid-column: span 10; }
        
        .finger-guide { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .finger { width: 40px; height: 10px; background: var(--key-bg); border-radius: 5px; }
        .finger.correct { background: var(--finger-correct); }
        .finger.incorrect { background: var(--finger-incorrect); }
        
        .stats { display: flex; justify-content: space-around; margin-bottom: 10px; font-weight: bold; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="card">
    <div class="stats">
        <div>WPM: <span id="wpm">0</span></div>
        <div>အချိန်: <span id="time">60</span>s</div>
        <button class="btn" onclick="toggleTheme()">Theme</button>
    </div>

    <div id="word-display"></div>
    <input type="text" id="word-input" placeholder="ဒီမှာ စတင်ရိုက်ပါ..." autofocus>

    <div class="keyboard" id="keyboard">
        <div class="key" data-key="q" data-finger="left-pinky">ဆ</div><div class="key" data-key="w" data-finger="left-ring">တ</div><div class="key" data-key="e" data-finger="left-middle">န</div><div class="key" data-key="r" data-finger="left-index">မ</div><div class="key" data-key="t" data-finger="left-index">အ</div>
        <div class="key" data-key="y" data-finger="right-index">ပ</div><div class="key" data-key="u" data-finger="right-index">က</div><div class="key" data-key="i" data-finger="right-middle">င</div><div class="key" data-key="o" data-finger="right-ring">သ</div><div class="key" data-key="p" data-finger="right-pinky">စ</div>
        <div class="key" data-key="a" data-finger="left-pinky">ေ</div><div class="key" data-key="s" data-finger="left-ring">ှ</div><div class="key" data-key="d" data-finger="left-middle">ိ</div><div class="key" data-key="f" data-finger="left-index">်</div><div class="key" data-key="g" data-finger="left-index">ါ</div>
<div class="key" data-key="h" data-finger="right-index">့</div><div class="key" data-key="j" data-finger="right-index">ြ</div><div class="key" data-key="k" data-finger="right-middle">ု</div><div class="key" data-key="l" data-finger="right-ring">ူ</div><div class="key" data-key=";" data-finger="right-pinky">း</div>
        <div class="key" data-key="z" data-finger="left-pinky">ဖ</div><div class="key" data-key="x" data-finger="left-ring">ထ</div><div class="key" data-key="c" data-finger="left-middle">ခ</div><div class="key" data-key="v" data-finger="left-index">လ</div><div class="key" data-key="b" data-finger="left-index">ဘ</div>
        <div class="key" data-key="n" data-finger="right-index">ည</div><div class="key" data-key="m" data-finger="right-index">ာ</div><div class="key" data-key="," data-finger="right-middle">ယ</div><div class="key" data-key="." data-finger="right-ring">ဝ</div><div class="key" data-key="/" data-finger="right-pinky">၏</div>
        <div style="grid-column: span 10"></div>
        <div class="key space" data-key=" " data-finger="thumb">Space</div>
    </div>
